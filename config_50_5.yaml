# CLIPGCN tri-modal contrastive training config.
# Relative paths are resolved from this config file's directory.

runtime:
  device: cuda:0
  seed: 20260616
  amp: true
  no_show: true

data:
  train:
    data_dir: ./data/contrastive_zsl_splits/50_5
    prefix: seen
    mmap: true

  # Leave data_dir null to create a stratified validation split from train.
  val:
    data_dir: null
    prefix: seen
    mmap: true

  validation_split:
    fraction: 0.1
    seed: 20260616

  text:
    xlsx: ./ntu55_global_descriptions.xlsx
    id_column: ID
    text_column: global_description
    label_offset: 1
    prompt_template: "{global_description}"
    batch_size: 128
    cache_output: ./work_dir/clip_text_action_embeddings.pt

  dataloader:
    batch_size: 128
    num_workers: 16
    train_shuffle: true
    val_shuffle: false
    pin_memory: true
    drop_last: true

model:
  text_encoder:
    name: ViT-B/32
    download_root: ./local_models/clip

train:
  epochs: 240
  val_interval: 1
  grad_clip_norm: 1.0
  optimizer:
    name: AdamW
    lr: 0.0001
    weight_decay: 0.0001

outputs:
  work_dir: ./work_dir/clipgcn_contrastive_50_5
  auto_run_dir: true
  run_name: null
  best_model: ./work_dir/clipgcn_contrastive_50_5/run_20260616_210139/best_model_old.pth
  last_model: ./work_dir/clipgcn_contrastive_50_5/last_model.pth
  history: ./work_dir/clipgcn_contrastive_50_5/history.json
  train_curve: ./work_dir/clipgcn_contrastive_50_5/train_curve.png
  test_results: ./work_dir/clipgcn_contrastive_50_5/unseen_test_results.json
